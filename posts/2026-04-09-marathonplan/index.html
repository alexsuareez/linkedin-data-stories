<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road to Milan — Race Plan | Alejandro Suárez</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700;800;900&family=Space+Mono:wght@400;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #06060a;
  color: #f0f0f0;
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  padding: 60px 24px;
}
.wrap {
  max-width: 1280px;
  margin: 0 auto;
}
.header {
  margin-bottom: 48px;
  text-align: center;
}
.tag {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #ff4d1a;
  margin-bottom: 12px;
}
h1 {
  font-size: 48px;
  font-weight: 900;
  letter-spacing: -1px;
  margin-bottom: 12px;
}
h1 span { color: #ff4d1a; }
.desc {
  font-size: 16px;
  color: #9ca3af;
  max-width: 640px;
  margin: 0 auto;
  line-height: 1.5;
}
.slides {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
  margin-bottom: 48px;
}
.slide-card {
  background: #0a0c10;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s;
  text-decoration: none;
  color: inherit;
}
.slide-card:hover {
  transform: translateY(-4px);
  border-color: rgba(255,77,26,0.3);
}
.slide-frame {
  position: relative;
  width: 100%;
  padding-top: 100%;
  overflow: hidden;
  background: #0a0c10;
}
.slide-frame iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 1080px;
  height: 1080px;
  transform: scale(0.555);
  transform-origin: top left;
  border: 0;
  pointer-events: none;
}
.slide-info {
  padding: 20px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.slide-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #ff4d1a;
  margin-bottom: 4px;
}
.slide-title {
  font-size: 16px;
  font-weight: 700;
  color: #fff;
}
.arrow {
  font-family: 'Space Mono', monospace;
  color: #4b5563;
  font-size: 18px;
}
.footer {
  text-align: center;
  padding-top: 32px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.author {
  font-size: 14px;
  color: #d1d5db;
  margin-bottom: 4px;
}
.author a {
  color: #ff4d1a;
  text-decoration: none;
}
.sub-footer {
  font-size: 12px;
  color: #4b5563;
}

@media (max-width: 900px) {
  .slides { grid-template-columns: 1fr; }
  h1 { font-size: 36px; }
}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="tag">Post 02 · LinkedIn Data Stories</div>
    <h1>Road to <span>Milan</span> — Race Plan</h1>
    <p class="desc">Mi primera maratón en datos. 12 semanas de preparación y el plan de carrera visualizado.</p>
  </div>

  <div class="slides">

    <a href="slide-1/" class="slide-card">
      <div class="slide-frame">
        <iframe src="slide-1/" scrolling="no"></iframe>
      </div>
      <div class="slide-info">
        <div>
          <div class="slide-label">Slide 01</div>
          <div class="slide-title">Mi primera maratón</div>
        </div>
        <div class="arrow">→</div>
      </div>
    </a>

    <a href="slide-2/" class="slide-card">
      <div class="slide-frame">
        <iframe src="slide-2/" scrolling="no"></iframe>
      </div>
      <div class="slide-info">
        <div>
          <div class="slide-label">Slide 02</div>
          <div class="slide-title">El plan · Sub 3:30</div>
        </div>
        <div class="arrow">→</div>
      </div>
    </a>

  </div>

  <div class="footer">
    <div class="author">Alejandro Suárez · <a href="https://www.linkedin.com/in/suarezalejandro/" target="_blank">LinkedIn</a></div>
    <div class="sub-footer">Wizz Air Milano Marathon · 12 abril 2026</div>
  </div>

</div>
</body>
</html>
